name: update-tap

# When a Release is Published (or via manual dispatch), bump the
# Homebrew tap formula at akira-toriyama/homebrew-tap to that tag and
# the fresh source-tarball sha256. Idempotent — re-running on the
# same tag is a no-op when the formula already matches.
#
# Cross-repo write requires a PAT (the workflow's GITHUB_TOKEN can
# only touch this repo). Add a fine-grained PAT with `Contents: Read
# & write` scoped to homebrew-tap only, as repo secret
# `HOMEBREW_TAP_TOKEN`. Mirrors facet's update-tap workflow exactly.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to bump (e.g. v1.4.0). Empty → latest published."
        required: false
        default: ""

concurrency:
  group: update-tap
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            t="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            t="${{ github.event.inputs.tag }}"
          else
            t="$(gh release view --repo ${{ github.repository }} \
                  --json tagName --jq .tagName)"
          fi
          echo "tag=$t" >> "$GITHUB_OUTPUT"
          echo "::notice::Target tag = $t"

      - name: Download source tarball + compute sha256
        id: sha
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL -o src.tgz "$url"
          s="$(sha256sum src.tgz | awk '{print $1}')"
          echo "sha=$s" >> "$GITHUB_OUTPUT"
          echo "::notice::sha256 = $s"

      - name: Checkout homebrew-tap (PAT)
        uses: actions/checkout@v6
        with:
          repository: akira-toriyama/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Bump Formula (idempotent)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          NEW_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          f="tap/Formula/stroke.rb"
          # No-op when the formula already matches.
          if grep -q "archive/refs/tags/${TAG}.tar.gz" "$f" \
             && grep -q "sha256 \"${NEW_SHA}\"" "$f"; then
            echo "::notice::Formula already at ${TAG} — nothing to do."
            exit 0
          fi
          sed -i -E "s|archive/refs/tags/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz|archive/refs/tags/${TAG}.tar.gz|g" "$f"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\"|sha256 \"${NEW_SHA}\"|g" "$f"
          # On any version bump, drop a leftover `revision N` line.
          # Revision only matters when REbuilding the same upstream
          # version (e.g. an install-script fix at the same tag); a
          # fresh tag naturally resets it. Same trick as facet's
          # update-tap to keep formula versions clean.
          sed -i -E '/^  revision [0-9]+$/d' "$f"
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/stroke.rb
          git commit -m "homebrew: bump stroke to ${TAG}"
          git push
          echo "::notice::Bumped tap to ${TAG} (sha ${NEW_SHA:0:12}…)."
