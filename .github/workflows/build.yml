name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight builds on the same PR / branch when a new push
  # arrives — only the latest commit matters for the required check.
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Least privilege, made explicit — closes zizmor's excessive-permissions
# finding ahead of the fleet-wide zizmor gate (akira-toriyama/.github t-qbp1).
permissions:
  contents: read

jobs:
  build:
    # macos-26: the package floor is macOS 26 — `swift test` executes the
    # built binaries, and a macos-15 host cannot load minos-26 images.
    runs-on: macos-26
    # Bounded so a hung `swift build` can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          # Build/test only: swift-build and the smoke step read and run
          # locally, never push — drop the persisted checkout token. t-yaxa
          persist-credentials: false

      # Shared Swift build (setup-xcode + SPM cache + build + test).
      - uses: akira-toriyama/.github/actions/swift-build@v2

      # Smoke-check the CLI parser path (no event tap touched).
      - name: Smoke (--help, config --validate)
        run: |
          .build/release/wand --help > /dev/null
          .build/release/wand config --validate
