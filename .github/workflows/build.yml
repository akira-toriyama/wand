name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      # macos runners default to an older Xcode (Swift 5.x); the package
      # needs the Swift 6 toolchain. Pin the latest stable Xcode.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      # XCTest needs Xcode (CommandLineTools has none) — runs here, not
      # in the CLT-only local dev flow (CLAUDE.md). Covers pure logic:
      # Recognition, Matcher, TOML parser, StrokeConfig.
      - name: Test
        run: swift test

      # Smoke-check the CLI parser path (no event tap touched).
      - name: Smoke (--help, --validate)
        run: |
          .build/release/stroke --help > /dev/null
          .build/release/stroke --validate
