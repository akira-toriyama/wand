name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight builds on the same PR / branch when a new push
  # arrives — only the latest commit matters for the required-check.
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    # Bounded so a hung `swift build` can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # macos runners default to an older Xcode (Swift 5.x); the package
      # needs the Swift 6 toolchain. Pin the latest stable Xcode.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # SPM cache. Zero external deps, but caching `.build/` keeps
      # compiled module artefacts warm and shaves the cold-build cost.
      # Key invalidates on Package.swift edits; the restore-key still
      # warm-starts across minor toolchain changes. Repo name is in
      # the key because the runner's workspace path is
      # `/Users/runner/work/<repo>/<repo>` — when the repo gets
      # renamed, PCHs in old caches reference the prior path and the
      # build dies with "PCH compiled with module cache path …".
      - uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ github.event.repository.name }}-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-${{ github.event.repository.name }}-

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      # XCTest needs Xcode (CommandLineTools has none) — runs here, not
      # in the CLT-only local dev flow (CLAUDE.md). Covers pure logic:
      # Recognition, Matcher, TOML parser, WandConfig.
      - name: Test
        run: swift test

      # Smoke-check the CLI parser path (no event tap touched).
      - name: Smoke (--help, --validate)
        run: |
          .build/release/wand --help > /dev/null
          .build/release/wand --validate
