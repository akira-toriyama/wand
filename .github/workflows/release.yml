name: Release
# Thin caller of glyph's reusable rolling-DRAFT release. A push to main makes
# `glyph release` compute the next version and the notes from each merged
# PR's individual (pre-squash) commits — gitmoji-driven and squash-safe — and
# create/update a single DRAFT release (no tag until you Publish in the UI).
# The verdict + draft logic and the binary that runs it ship together from
# akira-toriyama/glyph at ONE concrete tag (never a moving ref); this file
# supplies only wand's name + install prose + the post-build smoke. Flipped
# from the git-cliff era akira-toriyama/.github release.yml@v1 (glyph fleet
# migration, t-n9ed); cliff.toml is gone — the classification table lives
# inside the glyph binary (`glyph rules`).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no draft; just artifacts)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: akira-toriyama/glyph/.github/workflows/release.yml@v0.10.2
    with:
      app: Wand
      smoke-cmd: "config --validate"
      dry-run: ${{ github.event.inputs.dry_run == 'true' }}
      install-notes: |
        ## Install

        **Homebrew (build from source — recommended):**

        ```sh
        brew install akira-toriyama/tap/wand
        curl --create-dirs -o ~/.config/wand/config.toml \
          https://raw.githubusercontent.com/akira-toriyama/wand/main/config.toml
        ```

        **Prebuilt (`Wand.zip` below):** the app is ad-hoc signed
        (not notarized), so macOS quarantines it on download. After
        unzipping into /Applications:

        ```sh
        xattr -dr com.apple.quarantine /Applications/Wand.app
        open /Applications/Wand.app
        ```

        Then grant **Accessibility** to *wand* (System Settings →
        Privacy & Security → Accessibility). Start with `wand` (or
        `WAND_DEBUG=1 wand` to mirror logs to stderr). See
        [README](https://github.com/akira-toriyama/wand#readme)
        for the rule schema and the yabai-style
        `wand <domain> --<verb>` CLI (`daemon` / `cast` / `tome` /
        `config`).
