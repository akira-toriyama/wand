name: Release

# Mirrors facet's rolling-draft model: a push to main (PR merge) makes
# git-cliff compute the next version from Conventional Commits and
# create/update a single DRAFT GitHub Release. No tag is created here —
# GitHub generates the tag on the target commit when you manually
# Publish in the UI. Merge more to main → the next-release draft grows;
# versions don't multiply while unpublished. workflow_dispatch +
# dry_run = full preview (no draft, no version consumed).
# Config: cliff.toml.
#
# Per release we build Wand.app via package.sh (ad-hoc signed for CI
# — users get a stable self-signed identity via setup-signing-cert.sh
# on install) and attach Wand.zip to the draft. Homebrew installs
# from the source tarball GitHub generates automatically per tag (the
# formula rebuilds locally and re-signs with the user's persistent
# identity).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no draft; just artifacts)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    # Bounded so a hung release step (build, signing, gh upload) can't
    # burn the macOS minutes budget. Generous — a cold build + package
    # + upload is well under this.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Same SPM cache as build.yml — the release flow runs the same
      # `swift build` underneath `package.sh`, so the warm artefacts
      # help here too.
      - uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      # Next version via git-cliff directly (official recommendation).
      # Unpublished drafts create no tag, so `last` stays at the last
      # Published version and the computed `next` is stable across
      # merges.
      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          next="$(git-cliff --config cliff.toml --bumped-version | tr -d '[:space:]')"
          last="$(git tag --sort=-v:refname | head -n1)"
          echo "next=$next last=${last:-<none>}"
          if [ -z "$next" ] || [ "$next" = "$last" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No release-worthy changes (feat/fix/perf/breaking) since ${last:-<none>}; nothing to do."
          else
            echo "release=true"  >> "$GITHUB_OUTPUT"
            echo "version=$next" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.ver.outputs.release == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git-cliff --config cliff.toml --unreleased --tag "$VERSION" --strip all > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "Initial release." > RELEASE_NOTES.md
          cat >> RELEASE_NOTES.md <<'EOF'

          ## Install

          **Homebrew (build from source — recommended):**

          ```sh
          brew install akira-toriyama/tap/wand
          curl --create-dirs -o ~/.config/wand/config.toml \
            https://raw.githubusercontent.com/akira-toriyama/wand/main/config.toml
          ```

          **Prebuilt (`Wand.zip` below):** the app is ad-hoc signed
          (not notarized), so macOS quarantines it on download. After
          unzipping into /Applications:

          ```sh
          xattr -dr com.apple.quarantine /Applications/Wand.app
          open /Applications/Wand.app
          ```

          Then grant **Accessibility** to *wand* (System Settings →
          Privacy & Security → Accessibility). Start with `wand` (or
          `wand --debug` to mirror logs to stderr). See
          [README](https://github.com/akira-toriyama/wand#readme)
          for the rule schema and the `--reload` / `--quit` /
          `--record` flags.
          EOF

      # Build Wand.app via package.sh (ad-hoc for CI — the script
      # picks $CODESIGN_ID > .signing-id > "-"). Same artifact users
      # get when they download Wand.zip from the release.
      - name: Build Wand.app + zip
        if: steps.ver.outputs.release == 'true'
        env:
          CODESIGN_ID: "-"
        run: |
          set -euo pipefail
          ./package.sh
          ./Wand.app/Contents/MacOS/wand --validate
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent Wand.app artifacts/Wand.zip

      # dry_run (workflow_dispatch only): no draft; upload notes +
      # artifact so you can preview without consuming a version.
      - name: Upload preview (dry run)
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-preview-${{ steps.ver.outputs.version }}
          path: |
            artifacts/Wand.zip
            RELEASE_NOTES.md

      - name: Dry-run summary
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          {
            echo "## Dry run: ${VERSION} (no draft created)"
            echo
            echo '```'
            cat RELEASE_NOTES.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Normal run (push:main, not dry_run): create/update the single
      # rolling DRAFT. No tag is created (GitHub tags the target commit
      # on Publish). Same-version draft is overwritten; stale auto-
      # drafts of other versions are discarded. Published releases are
      # never touched.
      - name: Create or update rolling DRAFT release
        if: steps.ver.outputs.release == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # List existing AUTO drafts (unpublished, semver tag).
          # Published releases (isDraft=false) are excluded — never
          # touched. bash 3.2 safe (no mapfile).
          gh release list --limit 100 --json tagName,isDraft \
            --jq '.[] | select(.isDraft==true and (.tagName|test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))) | .tagName' \
            > /tmp/drafts.txt || true

          have_current=0
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            if [ "$t" = "$VERSION" ]; then
              have_current=1
            else
              echo "::notice::Superseding stale auto-draft $t -> $VERSION"
              gh release delete "$t" --yes || true
              git push origin ":refs/tags/$t" 2>/dev/null || true
            fi
          done < /tmp/drafts.txt

          assets="artifacts/Wand.zip"
          if [ "$have_current" -eq 1 ]; then
            gh release upload "$VERSION" $assets --clobber
            gh release edit "$VERSION" --draft \
              --title "$VERSION" --notes-file RELEASE_NOTES.md --target "$SHA"
            url="$(gh release view "$VERSION" --json url --jq .url)"
            action="updated"
          else
            url="$(gh release create "$VERSION" --draft --target "$SHA" \
              --title "$VERSION" --notes-file RELEASE_NOTES.md $assets)"
            action="created"
          fi

          echo "::notice::Draft release ${action} (unpublished, no tag yet). Review & Publish manually: ${url}"
          {
            echo "## Draft release ${VERSION} ${action} (unpublished)"
            echo
            echo "Merging more to main grows this draft. Review and Publish"
            echo "manually (the tag is created at Publish time): ${url}"
          } >> "$GITHUB_STEP_SUMMARY"
