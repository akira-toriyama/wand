name: Release

# Thin caller of the shared rolling-DRAFT release (atelier Track 3).
# The version-compute + dry-run + draft-management logic lives once in
# akira-toriyama/.github; this file supplies only wand's name + install
# prose + the post-build --validate smoke. See that reusable's header
# for the model. Config: cliff.toml.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no draft; just artifacts)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: akira-toriyama/.github/.github/workflows/release.yml@main
    with:
      app: Wand
      smoke-cmd: "config --validate"
      dry-run: ${{ github.event.inputs.dry_run == 'true' }}
      install-notes: |
        ## Install

        **Homebrew (build from source — recommended):**

        ```sh
        brew install akira-toriyama/tap/wand
        curl --create-dirs -o ~/.config/wand/config.toml \
          https://raw.githubusercontent.com/akira-toriyama/wand/main/config.toml
        ```

        **Prebuilt (`Wand.zip` below):** the app is ad-hoc signed
        (not notarized), so macOS quarantines it on download. After
        unzipping into /Applications:

        ```sh
        xattr -dr com.apple.quarantine /Applications/Wand.app
        open /Applications/Wand.app
        ```

        Then grant **Accessibility** to *wand* (System Settings →
        Privacy & Security → Accessibility). Start with `wand` (or
        `WAND_DEBUG=1 wand` to mirror logs to stderr). See
        [README](https://github.com/akira-toriyama/wand#readme)
        for the rule schema and the yabai-style
        `wand <domain> --<verb>` CLI (`daemon` / `cast` / `tome` /
        `config`).
