# stroke — user configuration
# https://github.com/akira-toriyama/stroke
#
# This file is the **single source of truth** for stroke's settings.
# stroke does NOT ship a GUI. Drop your edited copy at
# ~/.config/stroke/config.toml:
#
#   curl --create-dirs -o ~/.config/stroke/config.toml \
#     https://raw.githubusercontent.com/akira-toriyama/stroke/main/config.toml
#
# stroke only ever READS this file. Out-of-range / unknown values are
# silently clamped to safe defaults rather than rejected — a typo can
# never break the daemon. Validate explicitly with `stroke --validate`.


# -----------------------------------------------------------------
# Trigger — which button (and optional modifiers) starts a stroke
# -----------------------------------------------------------------
[trigger]

# Which mouse button initiates a stroke.
#   "right"   — right mouse button (most common)
#   "middle"  — middle button / scroll-wheel click
#   "side1"   — back button (Mouse Button 4)
#   "side2"   — forward button (Mouse Button 5)
button = "right"

# Modifier keys that must be held at button-down for a stroke to
# start. Empty = no modifier required.
# Valid values: "cmd", "opt", "ctrl", "shift", "fn"
modifiers = []


# -----------------------------------------------------------------
# Recognition — how samples turn into a direction sequence
# -----------------------------------------------------------------
[recognition]

# Minimum displacement (px) before a new direction is emitted.
# Smaller = more sensitive (catches small flicks), bigger = more
# tolerant of jitter. Clamped 4..200.
min-stroke-px = 16

# Maximum time (ms) a single segment may take — the clock resets on
# every turn, so it's a per-segment budget, not a whole-stroke one. A
# multi-segment gesture gets the full budget for each leg; only a
# stalled single direction (an ordinary, deliberate right-drag) runs
# past it and is abandoned (no action fires). 0 = no limit. Clamped
# 100..60000 when set.
max-segment-ms = 0

# Scribble-to-cancel: the number of 180° direction reversals (a quick
# back-and-forth) that abandons the in-progress stroke. Once reached
# the gesture is dead — releasing fires nothing, with no waiting for a
# timeout. A real gesture rarely reverses, so 2 catches a deliberate
# scribble without false positives. 0 = off. Clamped 1..20 when set.
# Raise it above the most-reversing rule you define.
cancel-reversals = 2

# Speed gate for the scribble: the reversals above must all fall within
# this window (ms) to cancel, so a *fast* back-and-forth cancels but a
# slow deliberate one doesn't. 0 = any speed (count alone cancels).
# Clamped 100..5000 when set.
cancel-window-ms = 500

# Bundle IDs where stroke is completely disabled — useful for apps
# that already have native gestures (Xcode, video editors, …).
# Supports `*` / `?` glob.
exclude-apps = []


# -----------------------------------------------------------------
# Overlay — the translucent trail drawn while you draw a gesture
# -----------------------------------------------------------------
[overlay]

# Show the trail while a stroke is in progress. The overlay is
# click-through and clears the instant you release the button.
enabled = true

# The trail is colored by whether the shape you've drawn so far
# matches a rule for the window under the cursor:
#   color           — while it matches a rule (and before you've
#                     moved enough to recognise any direction)
#   color-no-match  — once the shape matches no rule (e.g. you set
#                     up "RD" but drew "RL")
# Either a name (blue red green orange purple pink yellow white black,
# or "accent" for the system accent color) or a hex string ("#rgb",
# "#rrggbb", "#rrggbbaa").
color = "#3b82f6"
color-no-match = "#ef4444"

# Stroke width in points. Clamped 1..40.
width = 3

# Show the target-app icon as a small "badge" at the gesture's
# start point (where the right button went down). Confirms which
# window the gesture will act on — useful when keyboard focus is
# on a different window than the cursor is over. Off keeps just
# the trail + assist tooltips.
badge-enabled = true

# Origin-badge size in points. Clamped 32..96.
badge-size = 56

# Use the macOS frosted blur (NSVisualEffectView) under the HUD
# cards + badge. Set false to fall back to a solid dark fill —
# easier on the eyes for some screens, and a touch cheaper.
blur-enabled = true

# Tiny scale-in pop (0.85 → 1.0 over 150 ms) when the origin
# badge first appears. Decorative; set false if motion bothers
# you.
anim-enabled = true


# -----------------------------------------------------------------
# Effects — animate assist cards as they leave the screen
# -----------------------------------------------------------------
# The overlay shows one assist card per reachable rule. Two moments
# can make a card disappear:
#   - mid-gesture, when you turn in a direction that no longer
#     reaches that card → driven by `unmatch`
#   - at button-up, when a rule actually fires → driven by `match`
#
# Default for both is "none" (cards just vanish). Pick a kind for
# either or both:
#
#   none           — instant disappear (default)
#   drop           — falls down off-screen
#   rise           — floats up off-screen
#   slide-left     — slides out to the left
#   slide-right    — slides out to the right
#   explode        — scales up briefly then fades
#   vibrate        — shakes in place, then fades
#   fade           — pure opacity fade
#   fireworks      — bursts upward from the card with a particle pop
#   confetti       — rains particles down past the card
#   random         — pick a random one each time a card disappears
#
# Particle effects (fireworks / confetti) are the most attention-
# grabbing, so they're most natural on `match` — the moment a rule
# actually fires.
[effect]
unmatch = "none"
match = "none"

# Overall size of the effect — bigger throws / denser particles.
#   subtle  ≈ 0.6× (calm)
#   normal  ≈ 1.0× (default, the calibrated baseline)
#   bold    ≈ 1.6× (more attention-grabbing)
#   wild    ≈ 2.5× (over-the-top)
intensity = "normal"


# -----------------------------------------------------------------
# Launcher — middle-click pops a contextual menu near the cursor
# -----------------------------------------------------------------
# Off by default. Set `enabled = true` to install the launcher tap
# alongside the gesture tap; both coexist on the same daemon.
#
# The menu is a native macOS context menu (NSMenu) — submenus open
# on hover, keyboard nav works (↑↓→← Enter Escape), click-outside
# dismisses. Each `[[item]]` is one menu row with the same
# action-type vocabulary as `[[rules]]`.
#
# The cursor-anchored target is captured at button-down, exactly
# like the gesture path, so the chosen item dispatches against the
# window you middle-clicked on — not whatever happens to have focus
# by the time you choose.
#
# Two changes that need a daemon restart (the tap is baked into the
# event mask at install): `enabled = false ↔ true` and `button`.
# Surfaced in `stroke --status` as `pending-restart`.
[launcher]
enabled = false                # opt-in
button = "middle"              # "middle" | "side1" | "side2" | "right"
modifiers = []                 # e.g. ["ctrl"] to require ctrl + middle

# Sample item — uncomment to try once `enabled = true`:
#
# [[item]]
# name = "新規タブ"
# apps = ["*chrome*", "*safari*"]
# action-type = "key"
# action-keys = "cmd+t"
#
# [[item]]
# name = "再読み込み"
# apps = ["*chrome*", "*safari*"]
# separator-before = true             # divider line above this row
# action-type = "key"
# action-keys = "cmd+r"
#
# # Nested submenu — `group = ["..."]` is the path to the parent
# # submenu. The folder is created on first reference; subsequent
# # items with the same group land inside it.
# [[item]]
# name = "名前順"
# group = ["並び替え"]
# action-type = "shell"
# action-cmd = "echo name"


# -----------------------------------------------------------------
# Rules — first match wins, applied to the cursor-anchored target
# -----------------------------------------------------------------
# Each `[[rules]]` block defines one gesture → action mapping.
# Rules are matched in document order; the FIRST one whose
# `pattern` matches and whose `apps` filter allows the target
# window's bundle id fires.
#
# Pattern alphabet:
#   L  = left      U  = up
#   R  = right     D  = down
# Sequences combine: "DR" = down then right; "URD" = up, right, down.
#
# IMPORTANT — cursor-anchored matching:
#   `apps` matches against the **window under the cursor at
#   stroke-start**, NOT the focused app. So a gesture started while
#   pointing at Chrome on display 2 always sees `*chrome*` even if
#   Finder happens to be focused on display 1. This is the whole
#   design point of stroke.
#
# `apps` syntax:
#   "*"                 — match every bundle id
#   "com.apple.Safari"  — exact
#   "*chrome*"          — glob (`*`, `?`)
#   "!com.apple.dt.Xcode" — exclusion (any matching exclusion wins)
#
# Action shapes (decomposed across keys to keep the TOML parser
# minimal — no inline tables):
#
#   action-type = "key"    + action-keys = "cmd+w"
#   action-type = "ax"     + action-verb = "close" | "minimize" |
#                                            "zoom" | "raise"
#   action-type = "shell"  + action-cmd  = "open -a Terminal …"
#
# `name` is also shown in the overlay while you're drawing a shape
# that matches this rule, so you can see what it'll do before
# releasing — make it human-readable.
#
# Shell actions receive these env vars describing the target:
#   STROKE_TARGET_BUNDLE_ID, STROKE_TARGET_PID,
#   STROKE_TARGET_TITLE,     STROKE_TARGET_FRAME (x,y,w,h)

[[rules]]
name = "close tab"
pattern = "DR"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+w"

[[rules]]
name = "reopen tab"
pattern = "UR"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+shift+t"

[[rules]]
name = "close window"
pattern = "DRU"
apps = ["*"]
action-type = "ax"
action-verb = "close"

[[rules]]
name = "minimize"
pattern = "L"
apps = ["*"]
action-type = "ax"
action-verb = "minimize"
