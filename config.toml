# wand ‚Äî user configuration
# https://github.com/akira-toriyama/wand
#
# This file is the **single source of truth** for wand's settings.
# wand does NOT ship a GUI. Drop your edited copy at
# ~/.config/wand/config.toml:
#
#   curl --create-dirs -o ~/.config/wand/config.toml \
#     https://raw.githubusercontent.com/akira-toriyama/wand/main/config.toml
#
# wand only ever READS this file. Out-of-range / unknown values are
# silently clamped to safe defaults rather than rejected ‚Äî a typo
# can never break the daemon. Validate explicitly with
# `wand --validate`.


# -----------------------------------------------------------------
# Schema layout (v7.0)
# -----------------------------------------------------------------
# Each block has a single concern. Nested sub-blocks scope fields
# by what they actually animate / configure, so the section path
# alone announces the responsibility ‚Äî no flat-prefix soup.
#
#   [exclude]                       ‚Äî global: applies to every trigger
#
#   [cast]                          ‚Äî cast trigger (right-button + drag
#                                     draws a shape; the wand "casts" the
#                                     matched rule on the cursor-anchored
#                                     target window) + cast-wide
#                                     `intensity` multiplier (scope spans
#                                     both [cast.overlay].cards and
#                                     [cast.fire].burst)
#   [cast.recognition]              ‚Äî sample ‚Üí direction tuning
#   [cast.overlay]                  ‚Äî overlay enabled toggle + blur
#   [cast.overlay.trail]            ‚Äî trail line itself
#   [cast.overlay.badge]            ‚Äî origin badge
#   [cast.overlay.cards]            ‚Äî assist-card exit animations
#   [cast.fire.burst]               ‚Äî fire-moment particle burst
#   [cast.fire.decal]               ‚Äî post-fire ink decal
#   [[cast.rule]]                   ‚Äî one cast pattern ‚Üí action
#
#   [tome]                          ‚Äî tome trigger (middle-click pops a
#                                     contextual menu ‚Äî your spellbook of
#                                     rows to pick from) + layout
#   [tome.row]                      ‚Äî per-row visual cosmetics
#   [tome.animation]                ‚Äî panel open / close animations
#   [tome.decoration]               ‚Äî static panel decoration
#   [[tome.item]]                   ‚Äî one menu row
#
# v6 retired (warned in /tmp/wand.log):
#   [gesture]            ‚Üí [cast]               (and every sub-block)
#   [[gesture.rule]]     ‚Üí [[cast.rule]]
#   [launcher]           ‚Üí [tome]               (and every sub-block)
#   [[launcher.item]]    ‚Üí [[tome.item]]


# -----------------------------------------------------------------
# Global ‚Äî disable wand entirely for specific bundle ids
# -----------------------------------------------------------------
[exclude]

# Bundle IDs where wand is completely disabled ‚Äî useful for apps
# that already have native gestures (Xcode, video editors, ‚Ä¶).
# Supports `*` / `?` glob. Applies to both cast rules and
# tome entries.
apps = []


# -----------------------------------------------------------------
# Failsafe ‚Äî required safety net (mandatory; missing block ‚Üí
# wand refuses to start)
# -----------------------------------------------------------------
# wand grabs low-level mouse via CGEventTap. A bug, a crash, or a
# swallowed event maps directly to "the user's PC is now unusable".
# This block defines the safety nets that catch such failures. It
# is **mandatory**: removing it makes `wand --validate` and server
# startup both refuse to proceed.
#
# Deliberate inversion of wand's clamp-to-default rule that covers
# every other key. A silently-defaulted safety net is worse than a
# loud "your config is missing this required block".
[failsafe]

# Maximum time (seconds) any mouse button may stay reported as
# `down` before wand force-releases it. Catches both wand-origin
# stuck states and external HID layers (Karabiner-Elements,
# Logitech Options, KVMs) that drop the real up event.
# Clamped 5..300.
mouse-hold-timeout-sec = 30

# Emergency release key. Observed via NSEvent global monitor ‚Äî
# passively, so the underlying app still receives the key (Esc still
# closes modals, cancels input, etc). The release sequence is
# idempotent: releasing an un-held button is a no-op, so the
# firehose of normal Esc presses is harmless. Only logs when wand
# actually released something ‚Äî quiet log = healthy, an entry =
# wand had to step in. Currently only "esc" is implemented; future
# keys can be added without a schema change.
emergency-release-key = "esc"


# -----------------------------------------------------------------
# Cast ‚Äî right-button + drag draws a shape that fires a rule
# -----------------------------------------------------------------
[cast]

# Which mouse button initiates a stroke.
#   "right"   ‚Äî right mouse button (most common)
#   "middle"  ‚Äî middle button / scroll-wheel click
#   "side1"   ‚Äî back button (Mouse Button 4)
#   "side2"   ‚Äî forward button (Mouse Button 5)
button = "right"

# Modifier keys that must be held at button-down for a stroke to
# start. Empty = no modifier required.
# Valid values: "cmd", "opt", "ctrl", "shift", "fn"
modifiers = []

# Overall multiplier applied to every visual effect produced by a
# cast firing ‚Äî `[cast.overlay.cards]` particle animations
# AND the `[cast.fire.burst]` cursor-anchored explosion. Decal
# has its own size / duration knobs and is not affected.
#
# Stays inline at this cast-family level because the scope spans
# both `[cast.overlay]` and `[cast.fire]` ‚Äî placing it inside
# either sub-block would mislead about which effects it scales.
#
#   subtle  ‚âà 0.6√ó (calm)
#   normal  ‚âà 1.0√ó (default, the calibrated baseline)
#   bold    ‚âà 1.6√ó (more attention-grabbing)
#   wild    ‚âà 2.5√ó (over-the-top)
intensity = "normal"


# -----------------------------------------------------------------
# Cast recognition ‚Äî sample ‚Üí direction tuning
# -----------------------------------------------------------------
# Behaviour knobs that don't affect what wand does, only how
# sensitive / forgiving the recognizer is. Split out of [cast]
# in v6 so trigger identity and recognition tuning don't share a
# section.
[cast.recognition]

# Minimum displacement (px) before a new direction is emitted.
# Smaller = more sensitive (catches small flicks), bigger = more
# tolerant of jitter. Clamped 4..200.
min-stroke-px = 16

# Maximum time (ms) a single segment may take ‚Äî the clock resets on
# every turn, so it's a per-segment budget, not a whole-stroke one.
# A multi-segment gesture gets the full budget for each leg; only a
# stalled single direction (an ordinary, deliberate right-drag) runs
# past it and is abandoned (no action fires). 0 = no limit. Clamped
# 100..60000 when set.
max-segment-ms = 0

# Scribble-to-cancel: the number of 180¬∞ direction reversals (a
# quick back-and-forth) that abandons the in-progress stroke. Once
# reached the gesture is dead ‚Äî releasing fires nothing, with no
# waiting for a timeout. A real gesture rarely reverses, so 2
# catches a deliberate scribble without false positives. 0 = off.
# Clamped 1..20 when set. Raise it above the most-reversing rule
# you define.
cancel-reversals = 2

# Speed gate for the scribble: the reversals above must all fall
# within this window (ms) to cancel, so a *fast* back-and-forth
# cancels but a slow deliberate one doesn't. 0 = any speed (count
# alone cancels). Clamped 100..5000 when set.
cancel-window-ms = 500


# -----------------------------------------------------------------
# Cast overlay ‚Äî translucent trail drawn while you draw a gesture
# -----------------------------------------------------------------
# Toggles and shared visuals that apply to the whole HUD (trail +
# badge + cards). The three components themselves live in dedicated
# sub-blocks below.
[cast.overlay]

# Show the trail / badge / cards while a stroke is in progress. The
# overlay is click-through and clears the instant you release the
# button. `enabled = false ‚Üí true` needs a daemon restart (the
# window is allocated at startup).
enabled = true

# Use the macOS frosted blur (NSVisualEffectView) under the HUD
# cards + badge. Set false to fall back to a solid dark fill ‚Äî
# easier on the eyes for some screens, and a touch cheaper.
blur-enabled = true


# Trail line ‚Äî the stroke you draw, plus how it recolours when the
# shape matches / doesn't match any rule.
[cast.overlay.trail]

# The trail is coloured by whether the shape you've drawn so far
# matches a rule for the window under the cursor:
#   color           ‚Äî while it matches a rule (and before you've
#                     moved enough to recognise any direction)
#   color-no-match  ‚Äî once the shape matches no rule (e.g. you set
#                     up "RD" but drew "RL")
# Accepts a name (blue red green orange purple pink yellow white
# black, or "accent" for the system accent color), a hex string
# ("#rgb" / "#rrggbb" / "#rrggbbaa"), or a reserved dynamic token:
#
#   "rainbow"   ‚Äî smooth hue cycle (~3s period). The whole trail
#                 shifts colour as the cursor moves; static cursors
#                 freeze on whatever frame they're on.
#   "neon"      ‚Äî electric palette (cyan / magenta / lime / hot
#                 pink / sky / violet) interpolated on a ~2s cycle.
#   "splatoon"  ‚Äî pick a random hue from the Splatoon ink palette
#                 at the start of each stroke. The whole drag stays
#                 in one team's colour; next stroke re-rolls.
#
# `color` and `color-no-match` are independent ‚Äî fine to set one to
# a dynamic token and the other to a static hex (e.g. `rainbow`
# while matching, solid red when off-track).
color = "#3b82f6"
color-no-match = "#ef4444"

# Trail width. Clamped 1..40. Meaning depends on `style`:
#   normal / dashed / dotted ‚Äî stroke width in points
#   pixel                    ‚Äî thickness in fixed-size cells
#                              (5pt cell; `width = 3` lays down a
#                              3-cell-wide stripe)
#   ascii                    ‚Äî thickness in fixed-size glyphs
#                              (11pt font; `width = 3` lays down a
#                              3-glyph-wide band)
# So in pixel / ascii, raising `width` adds more small marks across
# the path rather than scaling each mark up ‚Äî a denser cluster of
# small glyphs / cells, not bigger ones.
width = 3

# Trail dash pattern preset. **Shape only ‚Äî the trail's colour is
# always sourced from `color` / `color-no-match` above**, so the
# match-vs-no-match signal isn't lost when the style changes.
#
#   "normal"  ‚Äî single solid stroke (default)
#   "dashed"  ‚Äî broken line (3:2 dash:gap, sized off `width`)
#   "dotted"  ‚Äî short-dash dotted line (0.6:2 dash:gap)
#   "pixel"   ‚Äî 8-bit / pixel-art: fixed 5pt cells stepped along the
#               path; `width` = cells across the path (thickness)
#   "ascii"   ‚Äî AA-art: 11pt monospaced glyphs (`* + x o # . : = ~ ^`)
#               picked randomly per stroke; `width` = glyphs across
#               the path (thickness)
#   "tetris"  ‚Äî pixel cells coloured by the 7-piece tetromino palette
#               (cyan/yellow/purple/green/red/blue/orange), one
#               colour per 4-cell unit. Style-specific exception:
#               `color` is overridden by the palette; `color-no-match`
#               still wins so the failure signal survives.
#   "pacman"  ‚Äî small pellets along the path + a Pac-Man wedge at the
#               cursor whose mouth opens along the current direction.
#               `width` = rows of pellets across the path.
style = "normal"

# Draw an arrowhead tip at the cursor in the last-committed direction
# ‚Äî a directional indicator pointing where the gesture's last segment
# went. Independent of `style` (a `dashed` trail can still opt in or
# out of the tip), so the indicator is its own axis, not bundled into
# the line-shape preset. `false` for a plain line.
arrowhead = true

# Cycle period in milliseconds for the dynamic colour modes
# (`rainbow` / `neon`). Smaller = faster strobe; larger = slower
# drift. Ignored by static and `splatoon` modes (`splatoon` is
# per-stroke fixed). Clamped 100..10000.
#
#   500   ‚Äî strobing (very fast colour churn)
#   1000  ‚Äî flicker
#   2000  ‚Äî default; visible cycle in a typical short stroke
#   5000  ‚Äî slow drift, almost-solid feel
color-cycle-ms = 2000

# How long (ms) the trail lingers after a gesture fires. The
# in-progress segment is first snapped onto its axis so the whole
# path reads as a clean orthogonal polyline, held at full alpha,
# then faded out across the window. Set to 0 for an instant clear
# (matches the no-match behaviour). Clamped 0..2000.
final-hold-ms = 400

# How committed past segments render once you turn (e.g. `D ‚Üí L` in
# `DLD`):
#   true   ‚Äî snap the just-completed segment onto its axis so the
#            trail reads as a clean orthogonal polyline.
#   false  ‚Äî keep every sample as raw freehand; the trail follows
#            the literal hand path, jitter included (default).
# Recognition is unaffected either way ‚Äî this is a render-only knob.
straighten-on-turn = false


# Origin badge ‚Äî small app-icon chip at the gesture's start point.
[cast.overlay.badge]

# Show the target-app icon as a small "badge" at the gesture's
# start point (where the right button went down). Confirms which
# window the gesture will act on ‚Äî useful when keyboard focus is on
# a different window than the cursor is over.
enabled = true

# Origin-badge size in points. Clamped 32..96.
size = 56

# Tiny scale-in pop (0.85 ‚Üí 1.0 over 150 ms) when the badge first
# appears. Decorative; set false if motion bothers you.
anim-enabled = true


# Assist-card exit animations ‚Äî the cards next to the cursor that
# list reachable rules. These animate cards INSIDE the overlay, so
# they require `[cast.overlay].enabled = true`.
#
# Pick a kind:
#   none           ‚Äî instant disappear (default)
#   drop           ‚Äî falls down off-screen
#   rise           ‚Äî floats up off-screen
#   slide-left     ‚Äî slides out to the left
#   slide-right    ‚Äî slides out to the right
#   explode        ‚Äî scales up briefly then fades
#   vibrate        ‚Äî shakes in place, then fades
#   fade           ‚Äî pure opacity fade
#   fireworks      ‚Äî bursts upward from the card with a particle pop
#   confetti       ‚Äî rains particles down past the card
#   random         ‚Äî pick a random one each time a card disappears
#
# Particle effects (`fireworks` / `confetti`) read most naturally on
# `match` ‚Äî the moment a rule actually fires.
[cast.overlay.cards]
match = "none"        # the firing card, on button-up
unmatch = "none"      # cards that became unreachable mid-gesture

# Card-text base font size in points. The arrow column rides at
# `font-size + 1` so directional glyphs stay a hair taller than
# rule names. The card padding is fixed in pt, so a bigger font
# expands the card naturally rather than just changing typography.
# Clamped 8..32.
font-size = 13

# Border stroke colour for assist cards. Empty falls back to the
# historical 18%-alpha white hairline (which reads against the
# blurred backing). Accepts the same grammar as
# `[cast.overlay.trail].color` ‚Äî hex / named (with optional alpha
# byte `#RRGGBBAA`), plus the dynamic tokens `"rainbow"` /
# `"neon"` / `"splatoon"`. Dynamic modes share trail's
# `color-cycle-ms` cadence and per-stroke seed, so the trail line
# and the card borders cycle in lockstep.
border-color = ""

# Body fill colour for **non-firing** (directional) assist cards.
# Empty leaves the body transparent over the blurred backing
# (historical behaviour). The firing card is always tinted with
# the trail accent regardless of this knob ‚Äî so the "this rule
# fires on release" signal stays loud. Same grammar as
# `border-color` above; dynamic modes work here too.
body-color = ""


# -----------------------------------------------------------------
# Cast fire-moment effects ‚Äî at the cursor when a rule fires
# -----------------------------------------------------------------
# Both sub-blocks live in their own click-through windows, so they
# fire even when `[cast.overlay].enabled = false`. Disable the
# trail but keep the burst ‚Äî or vice versa.

# Particle explosion at the cursor the moment a gesture fires.
[cast.fire.burst]

#   "off"    ‚Äî no burst (default)
#   "burst"  ‚Äî omnidirectional particle explosion (~0.7s)
# Burst color rides `[cast.overlay.trail].color` (the same accent
# the trail uses), so the burst reads as tied to the action.
kind = "off"


# Post-fire ink decal ‚Äî a Splatoon-style splatter left at the
# cursor when a gesture fires.
[cast.fire.decal]

#   "off"           ‚Äî no decal (default)
#   "ink-splatter"  ‚Äî Splatoon-style splat: 2-3 independent splat
#                     units at random offsets. Each unit is a
#                     classic SVG ink-splat silhouette ‚Äî round body
#                     with radial tendril spikes + a darker ink-ring
#                     underlayer + 3-6 detached droplet specks.
#                     With `color = "splatoon"` each unit can land a
#                     different team colour (the Splatoon multi-shot
#                     feel ‚Äî one decal, multiple ink hits).
kind = "off"

# How long (ms) the decal stays visible before fading out.
# Clamped 0..10000. 0 collapses to "off" regardless of `kind` above.
duration-ms = 3000

# Decal footprint in points (width = height). Clamped 10..500.
size = 60

# Ink colour. Three modes:
#   ""        ‚Äî empty / unset: inherit `[cast.overlay.trail].color`.
#               This is the historical default (the splat matches
#               the trail accent).
#   "trail"   ‚Äî explicit form of the above.
#   "splatoon" ‚Äî pick a random hue from a 10-colour Splatoon-style
#                ink palette on every fire (orange / yellow / lime /
#                neon green / peppermint / sapphire / purple /
#                magenta / pink / coral, sourced from a Turf War
#                colour-pair compilation). The deliberate Turf War
#                feel ‚Äî each fire is a different team's ink.
#   <hex / named> ‚Äî anything `[cast.overlay.trail].color` accepts
#                   (e.g. `"#ff00ff"` / `"systemPink"`) overrides
#                   with that fixed colour.
color = ""


# -----------------------------------------------------------------
# Tome ‚Äî middle-click pops a contextual menu near the cursor
# -----------------------------------------------------------------
# Off by default. Set `enabled = true` to install the tome tap
# alongside the cast tap; both coexist on the same daemon.
#
# The tome renders as a non-activating panel (PopClip parity) ‚Äî
# it does NOT take keyboard focus, so the user keeps typing in the
# underlying app while picking a row with the mouse. Submenus
# (`group = ["..."]`) open on hover as adjacent child panels. Click
# outside or press Esc to dismiss. Each `[[tome.item]]` is one
# row with the same action-type vocabulary as `[[cast.rule]]`.
#
# The cursor-anchored target is captured at button-down, exactly
# like the cast path, so the chosen item dispatches against the
# window you middle-clicked on ‚Äî not whatever happens to have focus
# by the time you choose.
#
# Two changes that need a daemon restart (the tap is baked into the
# event mask at install): `enabled = false ‚Üî true` and `button`.
# Surfaced in `wand --status` as `pending-restart`.
[tome]
enabled = false                # opt-in
button = "middle"              # "middle" | "side1" | "side2" | "right"
modifiers = []                 # e.g. ["ctrl"] to require ctrl + middle

# Visual orientation of the panel:
#   "list"            ‚Äî vertical rows (default; full feature set)
#   "toolbar"         ‚Äî horizontal icon-only buttons (PopClip vibe)
#   "labeled-toolbar" ‚Äî horizontal icon + label "pill" buttons
# Toolbar variants ignore `header` / `subtitle` / `separator-before`
# / `[tome.row].shortcut-badge` (no room to render them); only
# `.list` shows every feature.
layout = "list"


# Per-row visual conventions that apply uniformly to every
# `[[tome.item]]`.
[tome.row]

# Auto-display a right-aligned ‚åòW-style glyph badge on `.list` rows
# whose action is `action-type = "key"`. The badge is derived from
# `action-keys` (`"cmd+shift+t"` ‚Üí `"‚åò‚áßT"`) ‚Äî purely documentation,
# the row still fires on click as usual. Other action types (ax /
# shell / url) and toolbar layouts have no badge. Set false to hide
# every badge globally.
shortcut-badge = true

# Draw a soft rounded "chip" behind emoji / text-glyph icons so they
# sit on the same visual footprint as SF Symbol icons. Has no effect
# on SF Symbol or file-path icons ‚Äî those already render at a
# consistent baseline. Set false to fall back to bare glyphs.
icon-chip = true


# Panel open / close animations. Temporal ‚Äî they play once each
# transition. Root + child panels animate in parallel so the cascade
# unwinds together.
[tome.animation]

# Open animation. Plays when a tome panel pops up (root panel
# on middle-click; child panels when a folder / dynamic row is
# hovered open). Default "off" keeps the historical instant pop.
# Unknown values log + clamp to "off".
#
#   "off"   ‚Äî no animation (default)
#   "fade"  ‚Äî alpha 0 ‚Üí 1 ease-out (~140 ms)
#   "pop"   ‚Äî alpha + scale 0.92 ‚Üí 1.0 ease-out cubic (~180 ms)
open = "off"

# Symmetric close animation. Mirrors `open` but on the way out ‚Äî
# `fade` eases alpha to 0, `pop` adds a scale-down. Default "off".
close = "off"


# Static panel decoration ‚Äî paints once and stays still. Distinct
# from `[tome.animation]` (which moves in time).
[tome.decoration]

# Decorative panel border. Sits on the colour-decoration axis (paired
# with the trail's shape-only `style`). Inherited by child panels for
# visual consistency.
#
#   "off"     ‚Äî no border (default)
#   "rainbow" ‚Äî animated hue-rotating outline cycling around the
#               panel's rounded rect (~4s loop)
#
# Future palette variants (vapor / pencil / solid hues) will land in
# follow-ups under this same block.
border = "off"


# -----------------------------------------------------------------
# Items (tome) and rules (cast) ‚Äî shared field reference
# -----------------------------------------------------------------
# Both `[[cast.rule]]` and `[[tome.item]]` use the same
# action-* vocabulary and app-filter syntax. Differences:
#
#   [[cast.rule]]    needs `pattern` (LURD sequence)
#   [[tome.item]]   needs `name` (menu label); supports
#                        icon / group / separator-before / state /
#                        dynamic / template-* for richer menu UI
#
# Pattern alphabet (cast rules):
#   L  = left      U  = up
#   R  = right     D  = down
# Sequences combine: "DR" = down then right; "URD" = up, right, down.
#
# IMPORTANT ‚Äî cursor-anchored matching:
#   `apps` matches against the **window under the cursor at
#   stroke-start / click time**, NOT the focused app. So a gesture
#   started while pointing at Chrome on display 2 always sees
#   `*chrome*` even if Finder happens to be focused on display 1.
#   This is the whole design point of wand.
#
# `apps` syntax:
#   "*"                 ‚Äî match every bundle id
#   "com.apple.Safari"  ‚Äî exact
#   "*chrome*"          ‚Äî glob (`*`, `?`)
#   "!com.apple.dt.Xcode" ‚Äî exclusion (any matching exclusion wins)
#
# Truly global items (`apps = ["*"]` or `apps` omitted) ALSO fire on
# Dock / menu bar / Desktop ‚Äî places where no AX target resolves
# under the cursor. App-specific items there are filtered out.
#
# `filter-title = "<glob>"` ‚Äî optional. Extra gate on top of `apps`,
# matched against the cursor-anchored target's window title (same
# `*` / `?` glob). Use it to scope a rule / item to a specific page
# or document.
#
#   filter-title = "*github.com*"      # only when title contains "github.com"
#   filter-title = "*pull/*"            # only on a PR
#
# `filter-shell = "<cmd>"` ‚Äî optional, niche escape hatch when title
# isn't enough. Evaluated via `/bin/sh -c` with a 100 ms budget;
# exit 0 = keep the row. Receives the same `WAND_TARGET_*` env vars
# the action shell does, plus inherited env. Use sparingly ‚Äî every
# shell-gated row adds 5-20 ms of menu-open latency.
#
#   filter-shell = "test $(date +%H) -ge 17"   # only after 5pm
#   filter-shell = "scripts/is_github_pr.sh"   # external predicate
#
# Action shapes (decomposed across dotted-style keys ‚Äî the minimal
# TOML parser doesn't support inline tables):
#
#   action-type = "key"    + action-keys = "cmd+w"
#   action-type = "ax"     + action-verb = "close" | "minimize" |
#                                            "zoom" | "raise"
#   action-type = "shell"  + action-cmd  = "open -a Terminal ‚Ä¶"
#   action-type = "url"    + action-url  = "https://github.com"
#                                          # also handles slack://,
#                                          # vscode://, file://, ‚Ä¶
#
# Shell actions receive these env vars describing the target:
#   WAND_TARGET_BUNDLE_ID, WAND_TARGET_PID,
#   WAND_TARGET_TITLE,     WAND_TARGET_FRAME (x,y,w,h)
# Tome items additionally receive:
#   SELECTION              the text selected in the focused element
#                          at button-down (empty if none / AX not
#                          granted). Use for translate / search /
#                          send-to-app workflows. Untrusted ‚Äî same
#                          quoting caveat as WAND_TARGET_TITLE.


# -----------------------------------------------------------------
# Cast rules ‚Äî first match wins, applied to the cursor-anchored
# target. `name` is shown in the overlay while drawing a shape that
# matches this rule, so you can see what it'll do before releasing
# ‚Äî make it human-readable.
# -----------------------------------------------------------------

[[cast.rule]]
name = "close tab"
pattern = "DR"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+w"

[[cast.rule]]
name = "reopen tab"
pattern = "UR"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+shift+t"

[[cast.rule]]
name = "close window"
pattern = "DRU"
apps = ["*"]
action-type = "ax"
action-verb = "close"

[[cast.rule]]
name = "minimize"
pattern = "L"
apps = ["*"]
action-type = "ax"
action-verb = "minimize"


# -----------------------------------------------------------------
# Tome items ‚Äî sample blocks below. Uncomment after
# `[tome].enabled = true`.
# -----------------------------------------------------------------

# Each item supports an optional `icon` field (drawn to the left of
# the menu label). Recognised syntax:
#
#   icon = "üåê"                  ‚Äî emoji / 1-2 character text glyph
#   icon = "SF:globe"            ‚Äî SF Symbol (macOS 11+; catalog:
#                                  open Symbols.app)
#   icon = "~/icons/foo.png"     ‚Äî tilde-expanded path
#   icon = "icons/foo.png"       ‚Äî relative to ~/.config/wand/
#   icon = "/abs/path.png"       ‚Äî absolute path
#
# Unrecognised values fall back to no icon (logged to /tmp/wand.log).
#
# # Basic row:
# [[tome.item]]
# name = "New Tab"
# icon = "üåê"
# apps = ["*chrome*", "*safari*"]
# action-type = "key"
# action-keys = "cmd+t"
#
# # Separator before this row + SF Symbol icon:
# [[tome.item]]
# name = "Reload"
# icon = "SF:arrow.clockwise"
# apps = ["*chrome*", "*safari*"]
# separator-before = true
# action-type = "key"
# action-keys = "cmd+r"
#
# # Subtitle ‚Äî a 2nd line of muted text below the title. Useful to
# # explain what an opaque `shell` action does, or to disambiguate two
# # identically-named items. Empty subtitle keeps the single-line row
# # height. Only renders in list layout (toolbar variants ignore it).
# # `{line}` substitution works on dynamic-item templates too.
# [[tome.item]]
# name = "Translate"
# subtitle = "ÈÅ∏Êäû„ÉÜ„Ç≠„Çπ„Éà„ÇíÊó•Êú¨Ë™û„Å∏"
# icon = "SF:globe"
# action-type = "shell"
# action-cmd  = "echo $SELECTION | translate --to ja"
#
# # App icon ‚Äî `icon = "app:<bundle-id>"` pulls the actual icon of an
# # installed app (running OR installed-but-inactive). Works for any
# # app LaunchServices knows about. Falls back to no icon if the
# # bundle id isn't installed.
# [[tome.item]]
# name = "Open Chrome"
# icon = "app:com.google.Chrome"
# action-type = "shell"
# action-cmd  = "open -na 'Google Chrome'"
#
# # Tint ‚Äî palette-colour an SF Symbol icon so the row reads in its
# # category at a glance (red for destructive, accent for the active
# # toggle, etc). Same colour grammar as the trail's `color`: named
# # ("systemRed" / "red" / "orange" / ‚Ä¶ / "accent" for the system
# # accent), or hex ("#rgb" / "#rrggbb" / "#rrggbbaa"). File / emoji
# # / text icons ignore this ‚Äî they have no hierarchical-colour path.
# [[tome.item]]
# name = "Move to Trash"
# icon = "SF:trash"
# tint = "systemRed"
# action-type = "ax"
# action-verb = "AXDelete"
#
# # Multi-colour palette ‚Äî `tint-colors = [...]` applies SF Symbol's
# # hierarchical / multicolor palette. Each entry uses the same
# # grammar as `tint`. Wins over a single `tint` when both are set.
# # File / emoji / text icons ignore this.
# [[tome.item]]
# name = "Battery Low"
# icon = "SF:battery.25.fill"
# tint-colors = ["red", "orange"]
# action-type = "shell"
# action-cmd  = "open 'x-apple.systempreferences:com.apple.preference.battery'"
#
# # Icon animation (macOS 14+) ‚Äî `icon-anim` fires an SF Symbol effect
# # on the icon when the row is hovered. Older macOS silently ignores
# # the field. Supported effects: "bounce" / "pulse". Only affects
# # SF Symbol icons.
# [[tome.item]]
# name = "Notifications"
# icon = "SF:bell.fill"
# icon-anim = "bounce"
# action-type = "url"
# action-url  = "x-apple.systempreferences:com.apple.preference.notifications"
#
# # Nested submenu ‚Äî `group = ["..."]` is the path to the parent
# # submenu. The folder is created on first reference; subsequent
# # items with the same group land inside it.
# [[tome.item]]
# name = "By Name"
# group = ["Sort"]
# action-type = "shell"
# action-cmd = "echo name"
#
# # Inline section header ‚Äî `header = "..."` draws a small-caps band
# # above any item whose `header` value differs from the previous
# # one's. Items with empty `header` inherit the current section, so
# # a run can share one label without repeating it. After filters
# # drop every item in a section, the header is omitted automatically
# # ‚Äî no orphan band. List layout only; toolbar variants ignore it.
# [[tome.item]]
# header = "Editing"
# name = "Copy"
# icon = "SF:doc.on.doc"
# action-type = "key"
# action-keys = "cmd+c"
#
# [[tome.item]]
# header = "Editing"
# name = "Paste"
# icon = "SF:doc.on.clipboard"
# action-type = "key"
# action-keys = "cmd+v"
#
# [[tome.item]]
# header = "Window"
# name = "Close"
# icon = "SF:xmark"
# action-type = "key"
# action-keys = "cmd+w"
#
# # Dynamic items ‚Äî the parent is a submenu populated at every menu
# # open by running `dynamic` (shell) and emitting one child per
# # stdout line. `{line}` in any `template-*` field is substituted
# # with the line content. Killed after 500ms if the shell hangs.
# #
# # SECURITY: `{line}` carries untrusted text. When the line ends up
# # in a shell command, quote it: 'git switch "{line}"', not
# # 'git switch {line}'.
# [[tome.item]]
# name = "Switch Branch"
# icon = "SF:point.3.connected.trianglepath.dotted"
# dynamic = 'cd ~/repo && git branch --format="%(refname:short)"'
# template-name = "{line}"
# template-icon = "SF:arrow.triangle.branch"
# template-action-type = "shell"
# template-action-cmd  = 'cd ~/repo && git switch "{line}"'
#
# # Checkmark / radio state ‚Äî `state` decorates a row with macOS's
# # native ‚úì / dash indicator. Static values: "on" / "off" / "mixed".
# # Dynamic: "shell:<cmd>" ‚Üí evaluated at menu-open, exit 0 ‚Üí ‚úì.
# # 100ms timeout (state should be a cheap check; longer probes
# # belong in `dynamic` items).
# [[tome.item]]
# name = "Dark Mode"
# state = "shell:defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark"
# action-type = "shell"
# action-cmd  = "osascript -e 'tell app \"System Events\" to keystroke \"d\" using {control down, option down, command down}'"
