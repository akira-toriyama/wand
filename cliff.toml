# git-cliff — derive next version + release notes from gitmoji + Conventional
# Commits. Convention: docs/commit-convention.md. Used by
# .github/workflows/release.yml (rolling-draft model). No CHANGELOG.md is
# committed; notes are generated on the fly at release time.

[changelog]
header = """
# Changelog

Release history of stroke.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
# semver is decided by the Conventional type (gitmoji is readability/grouping).
conventional_commits = true
# Keep non-Conventional commits in scope; parsers below skip them.
filter_unconventional = false
protect_breaking_commits = true
topo_order = false
sort_commits = "oldest"
tag_pattern = "v[0-9]*"

# Strip a leading gitmoji so the Conventional parser sees the bare type.
# 1) :code: form  2) emoji glyph (leading non-ASCII run). The hook + lint
# enforce form (1), so (2) normally never fires — it is a defensive net for
# inputs that bypass them (old history, bots, GitHub web edits), not a
# contradiction of the convention.
commit_preprocessors = [
  { pattern = '^:[\w-]+:\s*', replace = "" },
  { pattern = '^[^\x00-\x7F]+\s*', replace = "" },
]

commit_parsers = [
  # --- exclude bot auto-commits (avoid version churn) ---
  { field = "author.name", pattern = "github-actions|web-flow|.*\\[bot\\]", skip = true },
  { field = "author.email", pattern = "actions@github|noreply@github", skip = true },

  # --- types that appear in releases ---
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^revert", group = "⏪ Revert" },

  # --- non-bumping types: excluded from the changelog too ---
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { message = "^refactor", skip = true },
  { message = "^test", skip = true },
  { message = "^build", skip = true },
  { message = "^ci", skip = true },
  { message = "^chore", skip = true },

  # Anything else: excluded (don't fold non-convention messages into a version).
  { message = ".*", skip = true },
]

[bump]
# Version when no tags exist yet.
initial_tag = "v1.0.0"
features_always_bump_minor = true
breaking_always_bump_major = true
